name: Deploy Standalone to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "standalone/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: standalone/package-lock.json

      - name: Install dependencies
        working-directory: standalone
        run: npm install

      - name: Build
        working-directory: standalone
        run: npm run build

      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: standalone/dist
          publish_branch: web
          commit_message: "deploy: ${{ github.sha }}"
